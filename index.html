  const answerCount = Object.keys(answers?.[quiz.qIndex] || {}).length;
  const playerCount = Object.keys(players).length;
  const shareUrl = location.href.split("#")[0];

  /* ---------- 퀴즈 동작 ---------- */
  const openLobby = async () => {
    await Promise.all([R("players").remove(), R("answers").remove()]);
    await R("quiz").update({ status: "lobby", qIndex: 0 });
  };
  const tryJoin = async () => {
    if (codeDraft.trim().toUpperCase() !== (conf.joinCode || "").toUpperCase())
      return notify("참여 코드가 일치하지 않습니다. 교수님 화면의 코드를 확인해 주세요.");
    try {
      await R("players/" + me.id).set(me.nick);
      setCodeDraft(""); notify("입장했습니다! 교수님 화면 명단에 표시됩니다.");
    } catch { notify("⚠ 입장 저장 실패 — 네트워크를 확인해 주세요."); }
  };
  const startQuestion = i => R("quiz").update({ status: "question", qIndex: i, qEndsAt: serverNow() + (quiz.timeLimit || 20) * 1000 });
  const revealQ = () => R("quiz").update({ status: "reveal" });
  const nextQ = () => quiz.qIndex + 1 < quiz.questions.length ? startQuestion(quiz.qIndex + 1) : R("quiz").update({ status: "ended" });
  const endQuiz = () => R("quiz").update({ status: "idle" });
  const submitAnswer = async choice => {
    if (quiz.status !== "question" || myAnswer !== undefined || secsLeft <= 0) return;
    await R("answers/" + quiz.qIndex + "/" + me.id).set({ choice, ts: serverNow() });
    await R("players/" + me.id).set(me.nick); // 지각 합류 자동 등록
  };
  const scoreboard = () => {
    const sc = {};
    Object.entries(players).forEach(([id, nick]) => { sc[id] = { nick, correct: 0 }; });
    Object.entries(answers || {}).forEach(([qi, m]) => Object.entries(m || {}).forEach(([id, a]) => {
      if (!sc[id]) sc[id] = { nick: "?", correct: 0 };
      if (a.choice === quiz.questions[qi]?.answer) sc[id].correct++;
    }));
    return Object.values(sc).sort((a, b) => b.correct - a.correct);
  };
  const dist = qi => {
    const m = answers?.[qi] || {}; const c = [0,0,0,0];
    Object.values(m).forEach(a => { c[a.choice] = (c[a.choice]||0)+1; });
    const t = Object.keys(m).length || 1;
    return c.map(n => ({ n, pct: Math.round(n/t*100) }));
  };
  const addQuestion = () => {
    const q = newQ;
    if (!q.q.trim() || q.choices.some(c => !c.trim())) return notify("문항과 4개 보기를 모두 입력해 주세요.");
    R("quiz/questions").set([...(quiz.questions||[]), { q: q.q.trim(), choices: q.choices.map(c=>c.trim()), answer: q.answer, expl: q.expl.trim() || "-" }]);
    setNewQ(null); notify("문항이 추가되었습니다.");
  };
  const delQuestion = i => askConfirm("문항 삭제", "Q"+(i+1)+" 문항을 삭제할까요?", () =>
    R("quiz/questions").set(quiz.questions.filter((_, j) => j !== i)));

  /* ---------- 신호등·질문 ---------- */
  const setSignal = v => R("signals/" + me.id).set({ v, ts: serverNow(), nick: me.nick });
  const mySignal = signals?.[me.id]?.v;
  const sigCounts = (() => {
    const fresh = Object.values(signals || {}).filter(s => serverNow() - s.ts < 30*60*1000);
    const t = fresh.length || 1; const c = { g:0, y:0, r:0 };
    fresh.forEach(s => c[s.v]++);
    return { g: Math.round(c.g/t*100), y: Math.round(c.y/t*100), r: Math.round(c.r/t*100), total: fresh.length };
  })();
  const postQuestion = () => {
    if (!qDraft.trim()) return;
    R("questions/" + uid()).set({ text: qDraft.trim(), ts: serverNow() });
    setQDraft(""); notify("질문이 익명으로 등록되었습니다.");
  };
  const voteQuestion = (qid, voted) => voted ? R("questions/"+qid+"/votes/"+me.id).remove() : R("questions/"+qid+"/votes/"+me.id).set(true);

  /* ---------- Exit Ticket ---------- */
  const myExit = exitR?.[me.id];
  const submitExit = () => {
    if (!exitForm.scale) return notify("이해도(1~5)를 선택해 주세요.");
    R("exit/" + me.id).set({ nick: me.nick, ...exitForm, ts: serverNow() });
    notify("Exit Ticket이 제출되었습니다. 수고하셨습니다!");
  };
  const exitList = Object.values(exitR || {});

  /* ---------- 설정 ---------- */
  const changeCode = () => askText("참여 코드 변경", "영문/숫자 4~8자", conf.joinCode, "새 참여 코드", v => {
    if (!/^[A-Za-z0-9]{4,8}$/.test(v.trim())) { notify("영문/숫자 4~8자로 입력해 주세요."); return false; }
    R("config/joinCode").set(v.trim().toUpperCase()); notify("참여 코드가 변경되었습니다.");
  });
  const changePin = () => askText("교수자 PIN 변경", "숫자 4~6자리", "", "새 PIN", v => {
    if (!/^\d{4,6}$/.test(v.trim())) { notify("숫자 4~6자리로 입력해 주세요."); return false; }
    R("config/pin").set(v.trim()); notify("PIN이 변경되었습니다.");
  });
  const verifyPin = () => {
    if (pinDraft.trim() !== (conf.pin || "1234")) { setPinDraft(""); return notify("PIN이 일치하지 않습니다."); }
    setInstructorOk(true); setPinOpen(false); setRole("instructor"); setTab("home");
    notify("교수자 모드로 전환되었습니다.");
  };
  const resetAll = () => askConfirm("전체 초기화", "퀴즈·신호·질문·Exit 데이터를 모두 지울까요? (문항·코드·PIN 유지)", async () => {
    await Promise.all([R("players").remove(), R("answers").remove(), R("signals").remove(), R("questions").remove(), R("exit").remove()]);
    await R("quiz").update({ status: "idle", qIndex: 0 });
    notify("초기화되었습니다.");
  });

  /* ---------- 분석 ---------- */
  const analytics = (() => {
    const users = {};
    const touch = (id, nick) => { if (!users[id]) users[id] = { nick, quizAns: 0, quizCorrect: 0, exit: false }; };
    Object.entries(players).forEach(([id, n]) => touch(id, n));
    Object.entries(answers || {}).forEach(([qi, m]) => Object.entries(m || {}).forEach(([id, a]) => {
      touch(id, players[id] || "?"); users[id].quizAns++;
      if (a.choice === quiz.questions[qi]?.answer) users[id].quizCorrect++;
    }));
    Object.entries(exitR || {}).forEach(([id, r]) => { touch(id, r.nick); users[id].exit = true; });
    const perQ = (quiz.questions || []).map((q, i) => {
      const m = answers?.[i] || {}; const n = Object.keys(m).length;
      const c = Object.values(m).filter(a => a.choice === q.answer).length;
      return { n, pct: n ? Math.round(c/n*100) : 0 };
    });
    return { users: Object.values(users), perQ };
  })();

  const TABS = isInstructor
    ? [["home","홈","🏠"],["quiz","퀴즈","▶"],["signal","신호등","🚦"],["exit","Exit","⏻"],["analytics","분석","📊"]]
    : [["home","홈","🏠"],["quiz","퀴즈","▶"],["signal","신호등","🚦"],["exit","Exit","⏻"]];

  /* ============================ RENDER ============================ */
  return (
    <div style={{ fontFamily: "'Noto Sans KR','Apple SD Gothic Neo',sans-serif", minHeight: "100vh", background: "#EDECE5", color: "#24272B", paddingBottom: 70 }}>
      <header style={{ background: "#0E6B5B", color: "#fff", padding: "12px 16px", position: "sticky", top: 0, zIndex: 20 }}>
        <div style={{ maxWidth: 860, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: ".16em", opacity: .75, fontWeight: 700 }}>CLASS PULSE <span style={{ letterSpacing: 0 }}>{APP_VERSION} {connected === false ? "🔴 연결 끊김" : connected ? "🟢" : "⏳"}</span></div>
            <div style={{ fontSize: 15, fontWeight: 900 }}>교육공학의 이해 · 실시간 세션</div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <span style={{ fontSize: 11.5, opacity: .9 }}>{me.nick}</span>
            {instructorOk ? (
              <div style={{ display: "flex", border: "1.5px solid rgba(255,255,255,.6)", borderRadius: 8, overflow: "hidden", fontSize: 11.5, fontWeight: 700 }}>
                {["student","instructor"].map(r => (
                  <button key={r} onClick={() => { setRole(r); setTab("home"); }} style={{ padding: "5px 10px", border: "none", cursor: "pointer", background: role === r ? "#fff" : "transparent", color: role === r ? "#0E6B5B" : "#fff" }}>{r === "student" ? "학생" : "교수자"}</button>
                ))}
              </div>
            ) : (
              <button onClick={() => { setPinDraft(""); setPinOpen(true); }} aria-label="교수자 전용"
                style={{ border: "none", background: "transparent", color: "rgba(255,255,255,.5)", fontSize: 15, padding: "4px 6px", cursor: "pointer" }}>🔒</button>
            )}
          </div>
        </div>
      </header>

      <main style={{ maxWidth: 860, margin: "0 auto", padding: "16px 14px" }}>
        {connected === false && (
          <div className="fade" style={{ background: "#FBEAE5", border: "1.5px solid #b3402a", borderRadius: 10, padding: "10px 12px", fontSize: 12.5, color: "#7c2d1c", marginBottom: 12 }}>
            <b>🔴 서버와 연결이 끊겼습니다.</b> 네트워크를 확인해 주세요. 연결되면 자동 복구됩니다.
          </div>
        )}

        {/* ==================== HOME ==================== */}
        {tab === "home" && (isInstructor ? (
          <div className="fade" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Card style={{ background: "#faf9f4" }}>
              <Label>수업 진행</Label>
              <div style={{ fontSize: 12.5, color: "#55585f", marginBottom: 10 }}>참여 코드 <b style={{ fontFamily: "monospace", color: "#0E6B5B" }}>{conf.joinCode}</b> · 접속 학생 {playerCount}명 · Exit {exitList.length}건</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                <Btn pri onClick={() => { setTab("quiz"); if (quiz.status === "idle") openLobby(); }}>▶ 퀴즈 세션 시작</Btn>
                <Btn onClick={() => setTab("analytics")}>분석 보기</Btn>
              </div>
            </Card>
            <Card>
              <Label>실시간 이해도 (최근 30분 · {sigCounts.total}명)</Label>
              <div style={{ display: "flex", height: 26, borderRadius: 8, overflow: "hidden", border: "1.5px solid #24272B", fontSize: 11.5, fontWeight: 900 }}>
                <div style={{ width: sigCounts.g+"%", background: "#BFE3CF", display: "flex", alignItems: "center", justifyContent: "center", minWidth: sigCounts.g?40:0 }}>{sigCounts.g>0 && "🟢"+sigCounts.g+"%"}</div>
                <div style={{ width: sigCounts.y+"%", background: "#F6E7B2", display: "flex", alignItems: "center", justifyContent: "center", minWidth: sigCounts.y?40:0 }}>{sigCounts.y>0 && "🟡"+sigCounts.y+"%"}</div>
                <div style={{ width: sigCounts.r+"%", background: "#F3C1B4", display: "flex", alignItems: "center", justifyContent: "center", minWidth: sigCounts.r?40:0 }}>{sigCounts.r>0 && "🔴"+sigCounts.r+"%"}</div>
                {sigCounts.total === 0 && <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "#a9aca7", fontWeight: 400 }}>아직 신호 없음</div>}
              </div>
              {sigCounts.r >= 30 && <div style={{ marginTop: 6, fontSize: 12.5, fontWeight: 900, color: "#b3402a" }}>⚠ '모르겠음' 30% 초과 — 추가 설명을 권장합니다</div>}
            </Card>
            <Card>
              <Label>설정</Label>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                <Btn sm onClick={changeCode}>참여 코드 변경</Btn>
                <Btn sm onClick={changePin}>교수자 PIN 변경</Btn>
                <Btn sm onClick={() => { setInstructorOk(false); setRole("student"); setTab("home"); }}>교수자 잠금</Btn>
                <Btn sm onClick={resetAll} style={{ color: "#b3402a" }}>세션 데이터 초기화</Btn>
              </div>
            </Card>
          </div>
        ) : (
          <div className="fade" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Card style={{ background: "#faf9f4" }}>
              <div style={{ fontSize: 14.5, fontWeight: 900, marginBottom: 4 }}>안녕하세요, {me.nick} 님</div>
              <div style={{ fontSize: 12.5, color: "#55585f", lineHeight: 1.6 }}>강의 중에는 <b>신호등</b>으로 이해도를 알려주시고, 퀴즈가 열리면 참여 코드로 입장하세요.</div>
            </Card>
            <Card>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div><div style={{ fontWeight: 900, fontSize: 13.5 }}>▶ 라이브 퀴즈</div>
                  <div style={{ fontSize: 11.5, color: quiz.status === "lobby" ? "#0E6B5B" : "#787b82", fontWeight: quiz.status === "lobby" ? 700 : 400 }}>
                    {quiz.status === "idle" ? "대기 중 — 교수님이 시작하면 열립니다" : quiz.status === "ended" ? "종료됨" : quiz.status === "lobby" ? "🔔 대기실이 열렸어요 — 지금 입장하세요!" : "진행 중!"}
                  </div></div>
                <Btn pri={quiz.status !== "idle"} onClick={() => setTab("quiz")}>입장</Btn>
              </div>
            </Card>
            <Card>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div><div style={{ fontWeight: 900, fontSize: 13.5 }}>⏻ Exit Ticket</div><div style={{ fontSize: 11.5, color: "#787b82" }}>{myExit ? "제출 완료 ✓" : "3문항 · 약 30초 · 성적 미반영"}</div></div>
                <Btn onClick={() => setTab("exit")}>{myExit ? "다시 보기" : "응답하기"}</Btn>
              </div>
            </Card>
          </div>
        ))}

        {/* ==================== QUIZ ==================== */}
        {tab === "quiz" && (
          <div className="fade" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {isInstructor ? (<React.Fragment>
              {quiz.status === "idle" && (
                <Card>
                  <Label>퀴즈 준비 · 문제은행 {(quiz.questions||[]).length}문항</Label>
                  {(quiz.questions||[]).map((q, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5, padding: "6px 0", borderBottom: "1px dashed #eceade" }}>
                      <span style={{ flex: 1 }}><b>Q{i+1}.</b> {q.q} <span style={{ color: "#0E6B5B", fontSize: 11 }}>정답: {SHAPES[q.answer]}</span></span>
                      <button onClick={() => delQuestion(i)} style={{ border: "none", background: "none", color: "#b3402a", cursor: "pointer" }}>✕</button>
                    </div>
                  ))}
                  <div style={{ display: "flex", gap: 6, marginTop: 12, flexWrap: "wrap" }}>
                    <Btn pri onClick={openLobby}>대기실 열기</Btn>
                    <Btn onClick={() => setNewQ({ q: "", choices: ["","","",""], answer: 0, expl: "" })}>+ 문항 직접 추가</Btn>
                  </div>
                  {newQ && (
                    <div className="fade" style={{ border: "1.5px solid #d8d6cc", borderRadius: 10, padding: 12, marginTop: 10, display: "flex", flexDirection: "column", gap: 6 }}>
                      <input value={newQ.q} onChange={e => setNewQ(s => ({ ...s, q: e.target.value }))} placeholder="문항 내용" className="inp" />
                      {newQ.choices.map((c, i) => (
                        <div key={i} style={{ display: "flex", gap: 6, alignItems: "center" }}>
                          <button onClick={() => setNewQ(s => ({ ...s, answer: i }))} title="정답으로 지정"
                            style={{ width: 30, height: 30, borderRadius: 8, border: "1.5px solid #24272B", cursor: "pointer", fontWeight: 900, background: newQ.answer === i ? "#0E6B5B" : "#fff", color: newQ.answer === i ? "#fff" : "#24272B" }}>{SHAPES[i]}</button>
                          <input value={c} onChange={e => setNewQ(s => ({ ...s, choices: s.choices.map((x, j) => j === i ? e.target.value : x) }))} placeholder={"보기 " + (i+1)} className="inp" style={{ flex: 1 }} />
                        </div>
                      ))}
                      <input value={newQ.expl} onChange={e => setNewQ(s => ({ ...s, expl: e.target.value }))} placeholder="해설 (한 문장)" className="inp" />
                      <div style={{ fontSize: 10.5, color: "#787b82" }}>ⓘ 도형 버튼을 눌러 정답을 지정하세요 (현재 정답: {SHAPES[newQ.answer]})</div>
                      <div style={{ display: "flex", gap: 6 }}><Btn pri sm onClick={addQuestion}>추가</Btn><Btn sm onClick={() => setNewQ(null)}>취소</Btn></div>
                    </div>
                  )}
                </Card>
              )}
              {quiz.status === "lobby" && (
                <Card style={{ textAlign: "center" }}>
                  <Label>대기실</Label>
                  <div style={{ fontSize: 11, color: "#787b82", marginTop: 6 }}>참여 코드</div>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, margin: "2px 0 10px" }}>
                    <span style={{ fontSize: 30, fontWeight: 900, fontFamily: "monospace", letterSpacing: ".14em" }}>{conf.joinCode}</span>
                    <Btn sm onClick={changeCode}>코드 변경</Btn>
                  </div>
                  <div style={{ background: "#faf9f4", borderRadius: 10, padding: "10px 12px", textAlign: "left", fontSize: 12.5, color: "#55585f", lineHeight: 1.8, marginBottom: 10 }}>
                    <b style={{ color: "#24272B" }}>학생 입장 방법</b><br />
                    ① 아래 QR(또는 주소)로 접속 ② 하단 <b>[▶ 퀴즈]</b> 탭 ③ 참여 코드 <b style={{ fontFamily: "monospace" }}>{conf.joinCode}</b> 입력 후 <b>[입장하기]</b> — 로그인·설치 불필요
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, marginBottom: 12 }}>
                    <QRSvg text={shareUrl} size={170} />
                    <div style={{ fontSize: 11, color: "#55585f", wordBreak: "break-all" }}>{shareUrl}</div>
                  </div>
                  <div style={{ background: "#fff", border: "2px solid #0E6B5B", borderRadius: 12, padding: 12, marginBottom: 12, textAlign: "left" }}>
                    <div style={{ fontSize: 13, fontWeight: 900, marginBottom: 8 }}>입장한 학생 <span style={{ color: "#0E6B5B", fontSize: 16 }}>{playerCount}</span>명 <span style={{ fontSize: 10.5, color: "#787b82", fontWeight: 400 }}>(즉시 반영)</span></div>
                    {playerCount === 0
                      ? <div style={{ fontSize: 12.5, color: "#a9aca7", textAlign: "center", padding: "12px 0" }}>아직 입장한 학생이 없습니다 — QR과 참여 코드를 안내해 주세요.</div>
                      : <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(130px,1fr))", gap: 5 }}>
                          {Object.values(players).map((n, i) => (
                            <div key={i} className="fade" style={{ display: "flex", alignItems: "center", gap: 6, background: "#e7f3ee", borderRadius: 8, padding: "5px 9px", fontSize: 12 }}>
                              <span style={{ fontFamily: "monospace", fontSize: 10, color: "#0E6B5B", fontWeight: 700 }}>{i+1}</span>
                              <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{n}</span>
                            </div>
                          ))}
                        </div>}
                  </div>
                  <div style={{ fontSize: 11.5, color: "#787b82", marginBottom: 8 }}>ⓘ 모든 학생의 입장을 확인한 뒤 시작해 주세요. 시작 후 입장한 학생도 응답 시 자동 참가됩니다.</div>
                  <div style={{ display: "flex", gap: 6, justifyContent: "center" }}>
                    <Btn pri disabled={playerCount === 0} onClick={() => askConfirm("퀴즈 시작", "현재 " + playerCount + "명 입장했습니다. 시작할까요?", () => startQuestion(0))}>퀴즈 시작 ({playerCount}명)</Btn>
                    <Btn onClick={endQuiz}>취소</Btn>
                  </div>
                </Card>
              )}
              {(quiz.status === "question" || quiz.status === "reveal") && curQ && (
                <Card>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, color: "#787b82", marginBottom: 8 }}>
                    <span>문항 {quiz.qIndex+1}/{quiz.questions.length} · 응답 {answerCount}/{playerCount}</span>
                    <span style={{ fontFamily: "monospace", fontWeight: 900, fontSize: 15, color: quiz.status === "question" && secsLeft <= 5 ? "#b3402a" : "#24272B" }}>{quiz.status === "question" ? "⏱ " + secsLeft + "s" : "마감"}</span>
                  </div>
                  <div style={{ fontSize: 16, fontWeight: 900, marginBottom: 12, lineHeight: 1.5 }}>{curQ.q}</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {curQ.choices.map((c, i) => {
                      const d = dist(quiz.qIndex)[i]; const isAns = i === curQ.answer;
                      return (
                        <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, border: "1.5px solid " + (quiz.status === "reveal" && isAns ? "#0E6B5B" : "#d8d6cc"), borderRadius: 9, padding: "8px 10px", background: quiz.status === "reveal" && isAns ? "#e7f3ee" : "#fff" }}>
                          <span style={{ fontWeight: 900 }}>{SHAPES[i]}</span>
                          <span style={{ flex: 1, fontSize: 13 }}>{c}{quiz.status === "reveal" && isAns && " ✓"}</span>
                          <div style={{ flex: 1, height: 14, background: "#e7e5dc", borderRadius: 4, overflow: "hidden" }}><div style={{ width: d.pct+"%", height: "100%", background: quiz.status === "reveal" && isAns ? "#0E6B5B" : "#8aa39c", transition: "width .4s" }} /></div>
                          <span style={{ fontFamily: "monospace", fontSize: 11.5, minWidth: 34, textAlign: "right" }}>{d.pct}%</span>
                        </div>
                      );
                    })}
                  </div>
                  {quiz.status === "reveal" && <div style={{ fontSize: 12.5, color: "#55585f", background: "#faf9f4", borderRadius: 8, padding: "8px 10px", marginTop: 10 }}>💡 {curQ.expl}</div>}
                  <div style={{ display: "flex", gap: 6, marginTop: 12 }}>
                    {quiz.status === "question" ? <Btn pri onClick={revealQ}>마감 · 정답 공개</Btn> : <Btn pri onClick={nextQ}>{quiz.qIndex+1 < quiz.questions.length ? "다음 문항 →" : "결과 보기"}</Btn>}
                    <Btn onClick={endQuiz}>세션 종료</Btn>
                  </div>
                </Card>
              )}
              {quiz.status === "ended" && (
                <Card>
                  <Label>최종 리더보드 (정확도 기준)</Label>
                  {scoreboard().slice(0, 10).map((s, i) => (
                    <div key={i} style={{ display: "flex", gap: 10, padding: "7px 0", borderBottom: "1px dashed #eceade", fontSize: 13 }}>
                      <span style={{ fontWeight: 900, minWidth: 28 }}>{i+1}위</span><span style={{ flex: 1 }}>{s.nick}</span><span style={{ fontFamily: "monospace" }}>{s.correct}/{quiz.questions.length}</span>
                    </div>
                  ))}
                  <div style={{ display: "flex", gap: 6, marginTop: 12 }}><Btn onClick={endQuiz}>닫기</Btn><Btn onClick={() => setTab("analytics")}>문항 분석 →</Btn></div>
                </Card>
              )}
            </React.Fragment>) : (<React.Fragment>
              {quiz.status === "idle" && (
                <Card style={{ textAlign: "center" }}>
                  <div style={{ color: "#787b82", fontSize: 13, marginBottom: 10 }}>아직 열린 퀴즈가 없습니다.<br />교수님이 대기실을 열면 즉시 이 화면에 나타납니다.</div>
                  <div style={{ background: "#faf9f4", borderRadius: 10, padding: "10px 12px", textAlign: "left", fontSize: 12, color: "#55585f", lineHeight: 1.7 }}>
                    <b style={{ color: "#24272B" }}>참여 방법 미리 보기</b><br />
                    ① 이 화면을 열어두세요 ② 대기실이 열리면 교수님 화면의 <b>참여 코드</b>를 입력하고 [입장하기] ③ 문항이 나오면 제한시간 안에 보기 하나를 탭!
                  </div>
                </Card>
              )}
              {quiz.status === "lobby" && (
                <Card style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 14, fontWeight: 900, marginBottom: 4 }}>퀴즈 대기실이 열렸습니다!</div>
                  <div style={{ fontSize: 12, color: "#787b82", marginBottom: 12 }}>나의 닉네임: <b style={{ color: "#24272B" }}>{me.nick}</b> (익명 참가)</div>
                  {players[me.id]
                    ? <div style={{ fontSize: 13, color: "#0E6B5B", fontWeight: 700 }}>입장 완료 ✓ 시작을 기다려 주세요 · 현재 {playerCount}명</div>
                    : (<React.Fragment>
                      <input value={codeDraft} onChange={e => setCodeDraft(e.target.value.toUpperCase())} onKeyDown={e => e.key === "Enter" && tryJoin()}
                        placeholder="참여 코드 입력" maxLength={8}
                        style={{ width: "100%", border: "1.5px solid #24272B", borderRadius: 10, padding: "12px", fontSize: 16, fontFamily: "monospace", letterSpacing: ".1em", textAlign: "center", marginBottom: 8, boxSizing: "border-box" }} />
                      <Btn pri style={{ width: "100%", padding: "12px 0", fontSize: 15 }} onClick={tryJoin}>입장하기</Btn>
                      <div style={{ background: "#faf9f4", borderRadius: 10, padding: "10px 12px", marginTop: 12, textAlign: "left", fontSize: 12, color: "#55585f", lineHeight: 1.7 }}>
                        <b style={{ color: "#24272B" }}>처음이신가요?</b><br />
                        ① 교수님 화면(프로젝터)의 <b>참여 코드</b>를 위에 입력하세요<br />
                        ② [입장하기]를 누르면 닉네임으로 자동 참가됩니다 (가입·로그인 없음)<br />
                        ③ 한 번 선택한 답은 변경할 수 없어요
                      </div>
                    </React.Fragment>)}
                </Card>
              )}
              {quiz.status === "question" && curQ && (
                <Card>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, color: "#787b82", marginBottom: 8 }}>
                    <span>Q{quiz.qIndex+1}/{quiz.questions.length}</span>
                    <span style={{ fontFamily: "monospace", fontWeight: 900, fontSize: 15, color: secsLeft <= 5 ? "#b3402a" : "#24272B" }}>⏱ {secsLeft}s</span>
                  </div>
                  <div style={{ fontSize: 14.5, fontWeight: 700, background: "#faf9f4", borderRadius: 9, padding: "10px 12px", marginBottom: 12, lineHeight: 1.5 }}>{curQ.q}</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    {curQ.choices.map((c, i) => (
                      <button key={i} onClick={() => submitAnswer(i)} disabled={myAnswer !== undefined || secsLeft <= 0}
                        style={{ border: "1.5px solid #24272B", borderRadius: 12, padding: "16px 8px", fontSize: 13, fontWeight: 700, cursor: "pointer", background: myAnswer?.choice === i ? "#0E6B5B" : "#fff", color: myAnswer?.choice === i ? "#fff" : "#24272B", opacity: myAnswer !== undefined && myAnswer.choice !== i ? .45 : 1 }}>
                        <div style={{ fontSize: 22, marginBottom: 4 }}>{SHAPES[i]}</div>{c}
                      </button>
                    ))}
                  </div>
                  <div style={{ textAlign: "center", fontSize: 11.5, color: "#787b82", marginTop: 10 }}>
                    {myAnswer !== undefined ? "응답 완료 — 결과를 기다려 주세요" : secsLeft <= 0 ? "시간 마감" : "보기를 선택하세요"}
                  </div>
                </Card>
              )}
              {quiz.status === "reveal" && curQ && (
                <Card style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 30, marginBottom: 6 }}>{myAnswer?.choice === curQ.answer ? "⭕" : myAnswer !== undefined ? "❌" : "⏳"}</div>
                  <div style={{ fontSize: 14, fontWeight: 900, marginBottom: 6 }}>{myAnswer === undefined ? "미응답" : myAnswer.choice === curQ.answer ? "정답입니다!" : "아쉬워요"}</div>
                  <div style={{ fontSize: 12.5, color: "#55585f" }}>정답: {SHAPES[curQ.answer]} {curQ.choices[curQ.answer]}</div>
                  <div style={{ fontSize: 12, color: "#787b82", background: "#faf9f4", borderRadius: 8, padding: "8px 10px", marginTop: 8, textAlign: "left" }}>💡 {curQ.expl}</div>
                </Card>
              )}
              {quiz.status === "ended" && (
                <Card>
                  <Label>최종 결과</Label>
                  {scoreboard().slice(0, 5).map((s, i) => (
                    <div key={i} style={{ display: "flex", gap: 10, padding: "6px 0", fontSize: 13, fontWeight: s.nick === me.nick ? 900 : 400, color: s.nick === me.nick ? "#0E6B5B" : undefined }}>
                      <span style={{ minWidth: 28 }}>{i+1}위</span><span style={{ flex: 1 }}>{s.nick}{s.nick === me.nick && " (나)"}</span><span style={{ fontFamily: "monospace" }}>{s.correct}/{quiz.questions.length}</span>
                    </div>
                  ))}
                </Card>
              )}
            </React.Fragment>)}
          </div>
        )}

        {/* ==================== SIGNAL ==================== */}
        {tab === "signal" && (
          <div className="fade" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {!isInstructor ? (
              <Card>
                <Label>지금 강의, 어느 정도 이해되나요? (익명 집계)</Label>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, margin: "8px 0" }}>
                  {[["g","🟢","이해됨"],["y","🟡","애매함"],["r","🔴","모르겠음"]].map(([v, e, t]) => (
                    <button key={v} onClick={() => setSignal(v)}
                      style={{ border: "2px solid " + (mySignal === v ? "#0E6B5B" : "#d8d6cc"), background: mySignal === v ? "#e7f3ee" : "#fff", borderRadius: 12, padding: "16px 4px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                      <div style={{ fontSize: 26, marginBottom: 4 }}>{e}</div>{t}
                    </button>
                  ))}
                </div>
                <div style={{ fontSize: 10.5, color: "#787b82", textAlign: "center" }}>익명으로 집계됩니다 · 언제든 변경 가능</div>
              </Card>
            ) : (
              <Card>
                <Label>실시간 이해도 (최근 30분 · {sigCounts.total}명)</Label>
                <div style={{ display: "flex", height: 30, borderRadius: 8, overflow: "hidden", border: "1.5px solid #24272B", fontSize: 12, fontWeight: 900 }}>
                  <div style={{ width: sigCounts.g+"%", background: "#BFE3CF", display: "flex", alignItems: "center", justifyContent: "center", minWidth: sigCounts.g?44:0 }}>{sigCounts.g>0 && "🟢 "+sigCounts.g+"%"}</div>
                  <div style={{ width: sigCounts.y+"%", background: "#F6E7B2", display: "flex", alignItems: "center", justifyContent: "center", minWidth: sigCounts.y?44:0 }}>{sigCounts.y>0 && "🟡 "+sigCounts.y+"%"}</div>
                  <div style={{ width: sigCounts.r+"%", background: "#F3C1B4", display: "flex", alignItems: "center", justifyContent: "center", minWidth: sigCounts.r?44:0 }}>{sigCounts.r>0 && "🔴 "+sigCounts.r+"%"}</div>
                  {sigCounts.total === 0 && <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "#a9aca7", fontWeight: 400 }}>아직 신호 없음</div>}
                </div>
                {sigCounts.r >= 30 && <div style={{ marginTop: 8, fontSize: 12.5, fontWeight: 900, color: "#b3402a" }}>⚠ '모르겠음' 30% 초과 — 추가 설명을 권장합니다</div>}
              </Card>
            )}
            <Card>
              <Label>익명 질문함 (공감순)</Label>
              {!isInstructor && (
                <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
                  <input value={qDraft} onChange={e => setQDraft(e.target.value)} onKeyDown={e => e.key === "Enter" && postQuestion()}
                    placeholder="✋ 익명으로 질문하기…" className="inp" style={{ flex: 1 }} />
                  <Btn pri onClick={postQuestion}>등록</Btn>
                </div>
              )}
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {Object.entries(questionsQ || {}).map(([id, q]) => ({ id, ...q, voteN: Object.keys(q.votes||{}).length, voted: !!(q.votes||{})[me.id] }))
                  .sort((a, b) => b.voteN - a.voteN)
                  .map(q => (
                    <div key={q.id} style={{ display: "flex", alignItems: "center", gap: 8, border: "1.5px solid #d8d6cc", borderRadius: 9, padding: "8px 10px" }}>
                      <span style={{ flex: 1, fontSize: 13 }}>{q.text}</span>
                      <button onClick={() => voteQuestion(q.id, q.voted)} className={"cpb sm"}
                        style={{ background: q.voted ? "#0E6B5B" : "#fff", color: q.voted ? "#fff" : "#24272B", borderColor: q.voted ? "#0E6B5B" : "#24272B" }}>▲ {q.voteN}</button>
                    </div>
                  ))}
                {Object.keys(questionsQ || {}).length === 0 && <div style={{ fontSize: 12.5, color: "#a9aca7", textAlign: "center", padding: "10px 0" }}>아직 질문이 없습니다.</div>}
              </div>
            </Card>
          </div>
        )}

        {/* ==================== EXIT ==================== */}
        {tab === "exit" && (
          <div className="fade" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {!isInstructor ? (
              myExit ? (
                <Card style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 28, marginBottom: 6 }}>✅</div>
                  <div style={{ fontWeight: 900, fontSize: 14 }}>제출 완료</div>
                  <div style={{ fontSize: 12.5, color: "#787b82", marginTop: 4 }}>이해도 {myExit.scale}/5 · 응답은 익명으로 집계됩니다.</div>
                </Card>
              ) : (
                <Card>
                  <Label>Exit Ticket · 성적 미반영</Label>
                  <div style={{ fontSize: 13.5, fontWeight: 900, margin: "6px 0 8px" }}>1. 오늘 수업 이해도는?</div>
                  <div style={{ display: "flex", gap: 6, justifyContent: "space-between", marginBottom: 16 }}>
                    {[1,2,3,4,5].map(n => (
                      <button key={n} onClick={() => setExitForm(f => ({ ...f, scale: n }))}
                        style={{ flex: 1, aspectRatio: "1", maxWidth: 52, border: "1.5px solid #24272B", borderRadius: 10, fontSize: 15, fontWeight: 900, cursor: "pointer", background: exitForm.scale === n ? "#0E6B5B" : "#fff", color: exitForm.scale === n ? "#fff" : "#24272B" }}>{n}</button>
                    ))}
                  </div>
                  <div style={{ fontSize: 13.5, fontWeight: 900, marginBottom: 6 }}>2. 오늘 가장 중요했던 개념 하나는?</div>
                  <input value={exitForm.concept} onChange={e => setExitForm(f => ({ ...f, concept: e.target.value }))} placeholder="예: 형성평가" className="inp" style={{ width: "100%", marginBottom: 16, boxSizing: "border-box" }} />
                  <div style={{ fontSize: 13.5, fontWeight: 900, marginBottom: 6 }}>3. 아직 궁금하거나 헷갈리는 점은?</div>
                  <textarea rows={3} value={exitForm.open} onChange={e => setExitForm(f => ({ ...f, open: e.target.value }))} placeholder="자유롭게 적어주세요…" className="inp" style={{ width: "100%", resize: "vertical", boxSizing: "border-box" }} />
                  <Btn pri style={{ width: "100%", marginTop: 12 }} onClick={submitExit}>제출</Btn>
                </Card>
              )
            ) : (<React.Fragment>
              <Card>
                <Label>Exit Ticket 결과 · 응답 {exitList.length}건 {exitList.length > 0 && "(평균 " + (exitList.reduce((s, r) => s + r.scale, 0) / exitList.length).toFixed(1) + ")"}</Label>
                <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 80, marginBottom: 4 }}>
                  {[1,2,3,4,5].map(n => {
                    const c = exitList.filter(r => r.scale === n).length;
                    const max = Math.max(1, ...[1,2,3,4,5].map(x => exitList.filter(r => r.scale === x).length));
                    return <div key={n} style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
                      <div style={{ fontSize: 10, textAlign: "center", color: "#787b82" }}>{c || ""}</div>
                      <div style={{ height: (c/max*60)+"px", background: "#0E6B5B", borderRadius: "4px 4px 0 0", opacity: c ? 1 : 0 }} />
                    </div>;
                  })}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#787b82", borderTop: "1.5px solid #24272B", paddingTop: 3 }}><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
              </Card>
              <Card>
                <Label>핵심 개념 (2번 문항)</Label>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {exitList.filter(r => r.concept?.trim()).map((r, i) => <span key={i} style={{ background: "#e7f3ee", borderRadius: 20, padding: "4px 12px", fontSize: 12.5 }}>{r.concept}</span>)}
                  {exitList.filter(r => r.concept?.trim()).length === 0 && <span style={{ fontSize: 12.5, color: "#a9aca7" }}>응답 대기 중</span>}
                </div>
              </Card>
              <Card>
                <Label>서술 원문 ({exitList.filter(r => r.open?.trim()).length}건 · 익명)</Label>
                {exitList.filter(r => r.open?.trim()).map((r, i) => <div key={i} style={{ fontSize: 12.5, padding: "6px 0", borderBottom: "1px dashed #eceade" }}>· {r.open}</div>)}
                {exitList.filter(r => r.open?.trim()).length === 0 && <div style={{ fontSize: 12.5, color: "#a9aca7" }}>아직 서술 응답이 없습니다.</div>}
              </Card>
            </React.Fragment>)}
          </div>
        )}

        {/* ==================== ANALYTICS ==================== */}
        {tab === "analytics" && isInstructor && (
          <div className="fade" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Card>
              <Label>문항별 정답률</Label>
              {analytics.perQ.map((p, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", fontSize: 12 }}>
                  <span style={{ minWidth: 28, fontWeight: 900 }}>Q{i+1}</span>
                  <div style={{ flex: 1, height: 14, background: "#e7e5dc", borderRadius: 4, overflow: "hidden" }}><div style={{ width: p.pct+"%", height: "100%", background: "#0E6B5B" }} /></div>
                  <span style={{ fontFamily: "monospace", minWidth: 64, textAlign: "right" }}>{p.pct}% ({p.n}명)</span>
                </div>
              ))}
            </Card>
            <Card>
              <Label>학생 참여 프로파일 (교수자 전용)</Label>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead><tr style={{ color: "#787b82", fontSize: 10.5, textAlign: "left" }}>
                    <th style={{ padding: "4px 6px", borderBottom: "1.5px solid #24272B" }}>닉네임</th>
                    <th style={{ padding: "4px 6px", borderBottom: "1.5px solid #24272B" }}>퀴즈 응답</th>
                    <th style={{ padding: "4px 6px", borderBottom: "1.5px solid #24272B" }}>정답률</th>
                    <th style={{ padding: "4px 6px", borderBottom: "1.5px solid #24272B" }}>EXT</th>
                  </tr></thead>
                  <tbody>
                    {analytics.users.map((u, i) => {
                      const rate = u.quizAns ? Math.round(u.quizCorrect/u.quizAns*100) : null;
                      return (
                        <tr key={i}>
                          <td style={{ padding: 6, borderBottom: "1px dashed #eceade" }}>{u.nick}</td>
                          <td style={{ padding: 6, borderBottom: "1px dashed #eceade", fontFamily: "monospace" }}>{u.quizAns}건</td>
                          <td style={{ padding: 6, borderBottom: "1px dashed #eceade", fontFamily: "monospace" }}>{rate === null ? "—" : rate + "%"}</td>
                          <td style={{ padding: 6, borderBottom: "1px dashed #eceade" }}>{u.exit ? "✓" : "—"}</td>
                        </tr>
                      );
                    })}
                    {analytics.users.length === 0 && <tr><td colSpan={4} style={{ padding: 10, color: "#a9aca7", fontSize: 12.5 }}>아직 참여 데이터가 없습니다.</td></tr>}
                  </tbody>
                </table>
              </div>
            </Card>
          </div>
        )}
      </main>

      {/* ---------- 하단 탭 ---------- */}
      <nav className="tabbar">
        {TABS.map(([k, v, icon]) => (
          <button key={k} className={tab === k ? "on" : ""} onClick={() => setTab(k)}>{icon}<br />{v}</button>
        ))}
      </nav>

      {/* ---------- 대화상자 ---------- */}
      {dlg && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(16,27,24,.55)", zIndex: 55, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={() => setDlg(null)}>
          <div className="card fade" style={{ maxWidth: 340, width: "100%" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 15, fontWeight: 900, marginBottom: 4 }}>{dlg.title}</div>
            {dlg.desc && <div style={{ fontSize: 12, color: "#787b82", marginBottom: 10 }}>{dlg.desc}</div>}
            {dlg.mode === "prompt" && (
              <input autoFocus onFocus={e => e.target.select()} value={dlg.value} placeholder={dlg.placeholder || ""}
                onChange={e => setDlg(s => ({ ...s, value: e.target.value }))}
                onKeyDown={e => { if (e.key === "Enter") { const r = dlg.ok(dlg.value); if (r !== false) setDlg(null); } }}
                className="inp" style={{ width: "100%", marginBottom: 12, boxSizing: "border-box" }} />
            )}
            <div style={{ display: "flex", gap: 6 }}>
              <Btn pri style={{ flex: 1 }} onClick={() => { const r = dlg.ok(dlg.value); if (r !== false) setDlg(null); }}>확인</Btn>
              <Btn style={{ flex: 1 }} onClick={() => setDlg(null)}>취소</Btn>
            </div>
          </div>
        </div>
      )}

      {/* ---------- PIN 모달 ---------- */}
      {pinOpen && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(16,27,24,.55)", zIndex: 55, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={() => setPinOpen(false)}>
          <div className="card fade" style={{ maxWidth: 320, width: "100%", textAlign: "center" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 15, fontWeight: 900, marginBottom: 4 }}>교수자 모드 잠금</div>
            <div style={{ fontSize: 12, color: "#787b82", marginBottom: 12 }}>교수자 전용 기능입니다. PIN을 입력하세요.</div>
            <input autoFocus type="password" inputMode="numeric" maxLength={6} value={pinDraft}
              onChange={e => setPinDraft(e.target.value.replace(/\D/g, ""))}
              onKeyDown={e => e.key === "Enter" && verifyPin()}
              placeholder="••••"
              style={{ width: "100%", border: "1.5px solid #24272B", borderRadius: 10, padding: 12, fontSize: 20, textAlign: "center", letterSpacing: ".4em", marginBottom: 10, boxSizing: "border-box" }} />
            <div style={{ display: "flex", gap: 6 }}>
              <Btn pri style={{ flex: 1 }} onClick={verifyPin}>확인</Btn>
              <Btn style={{ flex: 1 }} onClick={() => setPinOpen(false)}>취소</Btn>
            </div>
          </div>
        </div>
      )}

      {toast && <div className="fade" style={{ position: "fixed", bottom: 76, left: "50%", transform: "translateX(-50%)", background: "#24272B", color: "#fff", borderRadius: 10, padding: "9px 18px", fontSize: 12.5, zIndex: 60, maxWidth: "88%", textAlign: "center" }}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(configured ? <App /> : <SetupScreen />);

</script>
</body>
</html>
